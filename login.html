<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coremotion - Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">

    <div class="login-card">
        <div class="brand-logo">
            <div class="brand-icon">C</div>
            <span class="brand-name">COREMOTION</span>
        </div>

        <form id="formLogin">
            <div class="input-group">
                <label>EMAIL/CPF/CNPJ</label>
                <input type="text" id="nome" placeholder="digite aqui..." required>
            </div>

            <div class="input-group">
                <label>Senha</label>
                <input type="password" id="senha" placeholder="digite aqui..." required>
                <a href="#" class="forgot-password">Esqueceu a senha?</a>
            </div>

            <button type="submit" class="btn-entrar">Entrar</button>
        </form>

        <p class="signup-text">Não tem conta? <a href="cadastro.html">Cadastre-se</a></p>
    </div>

    <script>
        document.getElementById('formLogin').addEventListener('submit', function(event) {
            event.preventDefault(); 
            const nomeDigitado = document.getElementById('nome').value;
            const senhaDigitada = document.getElementById('senha').value;

            if (nomeDigitado === 'admin' && senhaDigitada === '12345678!') {
                alert('Login efetuado com sucesso!');
            } else {
                alert('Dados incorretos.');
            }
        });
    </script>
</body>
</html>
